# True color & undercurl support (Kitty/Neovim compatible)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-kitty:Tc,xterm-256color:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Performance
set -sg escape-time 0
set -g focus-events on
set -g status-interval 5

# Scrollback
set -g history-limit 50000

# Window/pane indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Splits — open in current directory
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Maximize pane
bind -r m resize-pane -Z

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jimeh/tmux-themepack'
set -g @themepack 'powerline/block/cyan'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @resurrect-capture-pane-contents 'on'

# Initialize TMux plugin manager (KEEP AT BOTTOM OF FILE)
run '~/.tmux/plugins/tpm/tpm'
